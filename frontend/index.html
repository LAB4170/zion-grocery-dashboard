<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zion Groceries Dashboard</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
    <div id="app">
        <!-- Navigation will be loaded here -->
        <nav id="navigation"></nav>
        
        <!-- Main content area -->
        <main id="main-content">
            <!-- Dashboard content will be loaded here -->
            <div id="dashboard-content"></div>
        </main>
    </div>

    <!-- Loading overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Loading dashboard...</p>
    </div>

    <!-- Error overlay -->
    <div id="error-overlay" class="error-overlay" style="display: none;">
        <div class="error-content">
            <h2>Database Connection Error</h2>
            <p>Unable to connect to the database. Please check your connection and try again.</p>
            <button onclick="location.reload()">Retry</button>
        </div>
    </div>

    <!-- Core Scripts - Load in specific order -->
    <script src="scripts/config.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/api-client.js"></script>
    <script src="scripts/data-manager.js"></script>
    
    <!-- Socket.IO for real-time sync -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="scripts/socket-io-sync.js"></script>
    
    <!-- Feature Scripts -->
    <script src="scripts/auth-check.js"></script>
    <script src="scripts/navigation.js"></script>
    <script src="scripts/pagination-utils.js"></script>
    <script src="scripts/dashboard.js"></script>
    <script src="scripts/products.js"></script>
    <script src="scripts/sales.js"></script>
    <script src="scripts/expenses.js"></script>
    <script src="scripts/debts.js"></script>
    <script src="scripts/reports.js"></script>
    <script src="scripts/main.js"></script>

    <!-- Initialization Script -->
    <script>
        // Initialize application after all scripts are loaded
        document.addEventListener('DOMContentLoaded', async function() {
            console.log(' Initializing Zion Grocery Dashboard...');
            
            try {
                // Wait for config to be available
                if (!window.CONFIG) {
                    throw new Error('Configuration not loaded');
                }
                
                // Initialize API client
                if (!window.apiClient) {
                    window.apiClient = new ApiClient();
                }
                
                // Initialize data manager
                if (!window.dataManager) {
                    window.dataManager = new DataManager();
                    await window.dataManager.initializationPromise;
                }
                
                // Check authentication
                if (typeof window.authManager !== 'undefined' && !window.authManager.isAuthenticated()) {
                    window.location.href = '/login';
                    return;
                }
                
                // Initialize navigation and load partials
                if (typeof initializeNavigation === 'function') {
                    await initializeNavigation();
                }
                
                // Initialize Socket.IO sync if available
                if (typeof window.initializeSocketSync === 'function') {
                    window.initializeSocketSync();
                }
                
                // Hide loading overlay
                const loadingOverlay = document.getElementById('loading-overlay');
                if (loadingOverlay) {
                    loadingOverlay.style.display = 'none';
                }
                
                console.log(' Dashboard initialization complete');
                
            } catch (error) {
                console.error(' Dashboard initialization failed:', error);
                
                // Show error overlay
                const errorOverlay = document.getElementById('error-overlay');
                const loadingOverlay = document.getElementById('loading-overlay');
                
                if (loadingOverlay) loadingOverlay.style.display = 'none';
                if (errorOverlay) errorOverlay.style.display = 'flex';
            }
        });
    </script>
</body>
</html>
